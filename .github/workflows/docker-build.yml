name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -t ghcr.io/github-campus-club-psgct/kriya2026_portal:latest .

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/github-campus-club-psgct/kriya2026_portal:latest

      - name: Trigger Jenkins Deploy
        run: |
          curl -k -X POST "https://jendc.psgtech.ac.in/generic-webhook-trigger/invoke?token=kriya2026frontend"